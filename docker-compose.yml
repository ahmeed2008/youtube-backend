version: '3.8'

services:
  youtube-service:
    build: .
    ports:
      - "7860:7860"
    environment:
      - HOST=0.0.0.0
      - PORT=7860
      - DEBUG=false
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/v1/video/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
